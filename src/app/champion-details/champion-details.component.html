@if (champion(); as champ) {
  <main class="details">
    <a class="details__back" routerLink="/" aria-label="Retour au dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
      Retour
    </a>

    <article class="details__card">
      <div class="details__header">
        <img
          [ngSrc]="championImageUrl"
          width="160"
          height="160"
          class="details__image"
          [alt]="champ.name"
          priority
        />
        <div class="details__title-row">
          <h1 class="details__name">{{ champ.name }}</h1>
          <app-fav-button [isFavorite]="champ.isFavorite" (toggled)="toggleFavorite()" />
        </div>
      </div>

      <dl class="details__meta">
        <div class="details__meta-item">
          <dt>Rôle</dt>
          <dd>{{ champ.role }}</dd>
        </div>
        <div class="details__meta-item">
          <dt>Lane</dt>
          <dd>{{ champ.lane }}</dd>
        </div>
        <div class="details__meta-item">
          <dt>Difficulté</dt>
          <dd>{{ champ.difficulty }} / 5</dd>
        </div>
      </dl>

      @if (champ.notes) {
        <section class="details__notes" aria-labelledby="notes-title">
          <h2 id="notes-title" class="details__notes-title">Notes</h2>
          <p class="details__notes-text">{{ champ.notes }}</p>
        </section>
      }
    </article>
  </main>
} @else {
  <main class="details details--not-found">
    <p>Champion introuvable.</p>
    <a routerLink="/">Retour au dashboard</a>
  </main>
}
