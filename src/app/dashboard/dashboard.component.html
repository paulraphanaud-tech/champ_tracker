<main class="dashboard">
    <h1 class="dashboard__title">Mes champions</h1>

    <section class="dashboard__grid" aria-label="Liste de champions">
        @for (champion of presenter.champions(); track champion.id) {
        <app-champion-card [champion]="champion" (favToggled)="presenter.toggleFavorite(champion.id)" />
        }
    </section>
</main>
